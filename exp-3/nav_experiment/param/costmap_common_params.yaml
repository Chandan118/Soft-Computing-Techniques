# A footprint is a polygon that represents the 2D shape of the robot.
# This is a square shape that generously covers the TurtleBot3 Burger.
footprint: [[0.105, 0.105], [0.105, -0.105], [-0.105, -0.105], [-0.105, 0.105]]
# For circular robots, you could use: robot_radius: 0.105

# The inflation layer adds a safety buffer around obstacles.
# The cost of cells decreases exponentially from the obstacle's actual position.
# This encourages the robot to stay away from walls.
inflation_layer:
  enabled:              true
  cost_scaling_factor:  10.0  # Exponential decay factor
  inflation_radius:     0.45  # Max distance from an obstacle to be affected

# Configuration for the static map layer, which uses the map from map_server.
static_layer:
  enabled:              true
  map_topic:            "map"

# Configuration for the obstacle layer, which uses sensor data to add dynamic obstacles.
obstacle_layer:
  enabled:              true
  # The observation_sources parameter defines a list of sensors to use.
  observation_sources:  laser_scan_sensor
  # Parameters for the laser_scan_sensor source.
  laser_scan_sensor:
    sensor_frame:     base_scan
    data_type:        LaserScan
    topic:            scan
    marking:          true  # Use this sensor to add (mark) obstacles
    clearing:         true  # Use this sensor to remove (clear) obstacles
    obstacle_range:   2.5   # Don't consider obstacles further away than this
    raytrace_range:   3.0   # Clear obstacles up to this distance away