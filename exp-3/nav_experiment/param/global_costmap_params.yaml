global_costmap:
  # The global frame for the costmap, usually 'map'.
  global_frame: map
  # The frame of the robot's base.
  robot_base_frame: base_footprint

  # How often to update the costmap (in Hz).
  update_frequency: 1.0
  # How often to publish the costmap for visualization (in Hz).
  publish_frequency: 1.0

  # The global_costmap is based on the static map from the map_server.
  static_map: true

  # The plugins define the layers that make up the costmap.
  # The order is important: static -> obstacle -> inflation.
  plugins:
    - {name: static_layer,    type: "costmap_2d::StaticLayer"}
    - {name: obstacle_layer,  type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}