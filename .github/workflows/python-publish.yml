name: Upload Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for trusted publishing (OIDC)

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
    - name: Build package
      run: python -m build
    - name: Publish package
      # Uses trusted publishing (no PYPI_API_TOKEN secret required)
      # Requires PyPI trusted publisher configured at https://pypi.org/manage/project/
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: dist/
